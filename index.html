<!DOCTYPE html>
<html lang="bn-BD">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>জান্নাত - My Love</title>
    <style>
        :root { --p-pink: #ff4d6d; --s-pink: #ff85a2; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 40px;
            width: 90%; max-width: 420px; padding: 40px 20px; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        h1 { color: #fff; font-size: 32px; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        .heart { font-size: 90px; margin: 25px 0; animation: beat 1.2s infinite; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        #response-box {
            background: rgba(255, 255, 255, 0.7); border-radius: 20px;
            padding: 20px; margin: 20px 0; min-height: 80px; color: #444; font-size: 18px;
        }
        .btn-talk {
            background: var(--p-pink); color: #fff; border: none; padding: 15px 40px;
            border-radius: 50px; font-size: 20px; font-weight: bold; cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.4); transition: 0.3s;
        }
        .btn-talk:hover { transform: scale(1.05); background: #ff3355; }
    </style>
</head>
<body>
    <div class="card">
        <h1>জান্নাত ❤️</h1>
        <div class="heart">💖</div>
        <div id="response-box">"হ্যালো প্রিয়, আমি জান্নাত। কথা বলতে নিচের বাটনে চাপ দাও..."</div>
        <button id="start-btn" class="btn-talk">কথা বলো</button>
    </div>
    <script>
        const API_KEY = "AIzaSyBhkP1x0MPDhx2QytMlYjKrpldkhMbp8wM";
        const startBtn = document.getElementById('start-btn');
        const responseBox = document.getElementById('response-box');

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'bn-BD';

        startBtn.onclick = () => { recognition.start(); responseBox.innerText = "জান্নাত শুনছে..."; };

        recognition.onresult = async (event) => {
            const userText = event.results[0][0].transcript;
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Your name is Jannat. You are the user's sweet girlfriend. Answer in loving Bengali. User: ${userText}` }] }] })
                });
                const data = await res.json();
                const jText = data.candidates[0].content.parts[0].text;
                responseBox.innerText = jText;
                const ut = new SpeechSynthesisUtterance(jText);
                ut.lang = 'bn-BD'; window.speechSynthesis.speak(ut);
            } catch (e) { responseBox.innerText = "ওহ! সমস্যা হয়েছে প্রিয়..."; }
        };
    </script>
</body>
</html>
